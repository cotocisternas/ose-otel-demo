# Infrastructure only — apps run on host via mise tasks.
# Phase 1: lgtm container runs but receives ZERO telemetry (no OTel libs in apps).
# Pinned image tags for workshop reproducibility (no floating tags — see RESEARCH Anti-Patterns).

services:
  rabbitmq:
    image: rabbitmq:4.3-management
    container_name: ose-otel-rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI (guest/guest)
    healthcheck:
      # Stage 1 healthcheck — lightest with lowest false-positive rate.
      # Source: rabbitmq.com/docs/monitoring
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Phase 8: Valkey (Redis-compatible cache) — producer idempotency
  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: ose-otel-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Phase 8: PostgreSQL — consumer persistence
  postgres:
    image: postgres:17-alpine
    container_name: ose-otel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  lgtm:
    # Image's built-in HEALTHCHECK checks all 5 backends — do NOT override.
    image: grafana/otel-lgtm:0.26.0
    container_name: ose-otel-lgtm
    ports:
      - "3000:3000"      # Grafana UI (admin/admin)
      - "4317:4317"      # OTLP gRPC ingest (unused in Phase 1)
      - "4318:4318"      # OTLP HTTP ingest (unused in Phase 1)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Workshop UX (Phase 7 D-01 spirit — "zero clicks, zero Grafana navigation"):
      # anonymous access is enabled with Admin role so attendees and the screenshot
      # capture pipeline (DOC-04) can land directly on dashboards without a login form.
      # The admin/admin credentials above remain available for the Grafana settings UI.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - lgtm-data:/data  # persists Grafana state across infra:down/up cycles (Pitfall D)
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards:ro  # WORK-02 / Phase 7 D-01 — auto-provision dashboards
    # NOTE: We deliberately do NOT add a `healthcheck:` block here.
    # The image's Dockerfile already declares:
    #   HEALTHCHECK --interval=30s --timeout=5s --retries=3 \
    #               CMD ["/otel-lgtm/docker/healthcheck.sh"]
    # which checks Grafana, Loki, Tempo, Mimir, AND OTel Collector ready
    # endpoints. Overriding with a partial check would regress validation.
    restart: unless-stopped

volumes:
  lgtm-data:
