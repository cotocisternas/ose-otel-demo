spring:
  application:
    name: order-producer
# RabbitMQ connection picked up from SPRING_RABBITMQ_* env vars (mise.toml)
management:
  endpoints:
    web:
      exposure:
        include: health
# Phase 8: Valkey connection (set by mise.toml env vars for dev; overridden by @DynamicPropertySource in IT)
valkey:
  host: ${VALKEY_HOST:localhost}
  port: ${VALKEY_PORT:6379}
  idempotency-ttl-seconds: 3600
app:
  notification-url: http://localhost:8080/notifications
