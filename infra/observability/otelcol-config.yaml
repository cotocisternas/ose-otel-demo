# OpenTelemetry Collector Contrib v0.151.0 — workshop demo configuration.
#
# THIS FILE IS THE WORKSHOP'S TEXTBOOK FOR THE COLLECTOR.
# Every block below carries an inline `# WHY:` comment explaining what each
# key does and why we chose this value. Read it top-to-bottom in your editor.
#
# WHY this file exists: the v1.0 demo used grafana/otel-lgtm's BUNDLED Collector;
# Phase 10 decomposes that single image into five separate containers. The
# Collector is now the SINGLE INGRESS for the three OTel signals — receiving
# OTLP from the apps and routing each signal to its dedicated backend (Tempo,
# Mimir, Loki). It also runs the prometheus scrape jobs that v1.0's
# `grafana/prometheus.yaml` used to feed lgtm's bundled Prometheus (D-05 — the
# Collector becomes "the single mouth feeding the backends").
#
# WHY pinned image: collector-contrib v0.151.0 (Apr 2026). Version-pinning is the
# Phase 10 STACK-02 invariant; `mise run verify:images` enforces no floating tags.
#
# Live-verified key shapes (vs older docs):
#   - exporter type `otlp_http` (WITH underscore) — `otlphttp` works but emits
#     a deprecation warning at startup (RESEARCH §F1-4 reversed).
#   - NO `loki:` exporter component in v0.151.0; logs ship via `otlp_http/loki`
#     to Loki's `/otlp` endpoint (RESEARCH §F1-4 reversed; Loki 3.7.1 OTLP-native).
#   - Mimir uses `prometheusremotewrite` — the canonical "many writers, one Mimir"
#     path. Tempo's metrics_generator (Phase 10 D-06) AND Loki's ruler (Phase 10 D-07)
#     ALSO write to the same `/api/v1/push` endpoint — three producers, one consumer,
#     single tenant (`multitenancy_enabled: false` in mimir-config.yaml).

# ──────────────────────────────────────────────────────────────────
# Receivers — what comes IN to the Collector
# ──────────────────────────────────────────────────────────────────
receivers:
  otlp:
    # WHY: STACK-03 invariant — `OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317`
    # in mise.toml (and the DEFAULT_OTLP_ENDPOINT in both OtelSdkConfiguration files)
    # MUST keep working unchanged. The Collector exposes BOTH gRPC :4317 and HTTP :4318
    # on the host (D-10) so attendees can flip between them via OTEL_EXPORTER_OTLP_PROTOCOL.
    protocols:
      grpc:
        # WHY: 0.0.0.0 so docker-compose host port mapping reaches us. NOT 127.0.0.1.
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # D-05 MIGRATION: scrape jobs that previously lived in grafana/prometheus.yaml,
  # mounted into lgtm's bundled Prometheus, now run inside this Collector. The
  # Collector forwards them to Mimir via prometheusremotewrite/mimir below —
  # same write path as OTLP→PRW translation, same Mimir tenant, same query layer.
  # Static-label `source: infra-exporter` is the disambiguator for the workshop's
  # two-lens story (app-emitted vs exporter-scraped) — preserved verbatim from v1.0.
  prometheus:
    config:
      scrape_configs:
        # WHY: rabbitmq_prometheus plugin exposes /metrics on :15692 (compose port);
        # /metrics/per-object yields per-queue/per-connection/per-channel labels
        # (preserved verbatim from grafana/prometheus.yaml).
        - job_name: rabbitmq
          metrics_path: /metrics/per-object
          static_configs:
            - targets: ['rabbitmq:15692']
              labels:
                source: infra-exporter

        # WHY: redis_exporter sidecar (Step 9 quick-260502-j00) — Valkey metrics
        # at :9121 (preserved verbatim from grafana/prometheus.yaml).
        - job_name: redis_exporter
          static_configs:
            - targets: ['redis-exporter:9121']
              labels:
                source: infra-exporter

        # WHY: postgres_exporter sidecar (Step 9 quick-260502-j00) — Postgres metrics
        # at :9187 (preserved verbatim from grafana/prometheus.yaml).
        - job_name: postgres_exporter
          static_configs:
            - targets: ['postgres-exporter:9187']
              labels:
                source: infra-exporter

        # WHY (IN-06): scrape the Collector's own self-metrics so they land in Mimir
        # alongside app + infra-exporter series. The telemetry.metrics block below
        # already EXPOSES the Prometheus endpoint on :8888; this job is what
        # actually INGESTS them into Mimir so they appear in Grafana dashboards
        # (rather than being curl-only). 'localhost' here resolves inside the
        # collector container — the receiver and the scrape target are the same
        # process. Static label `source: infra-exporter` matches the workshop's
        # two-lens story (sibling to rabbitmq / redis_exporter / postgres_exporter).
        - job_name: otelcol
          static_configs:
            - targets: ['localhost:8888']
              labels:
                source: infra-exporter

# ──────────────────────────────────────────────────────────────────
# Processors — what happens between RECEIVE and EXPORT
# ──────────────────────────────────────────────────────────────────
processors:
  memory_limiter:
    # WHY: workshop-grade safety valve — stop accepting new spans/metrics/logs
    # when the Collector heap exceeds the soft limit. Not production-tuned;
    # production deployments would profile actual load and tune `limit_mib`
    # to ~80% of container memory. Phase 11 may revisit when tail_sampling
    # buffers entire traces in memory.
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15

  batch:
    # WHY: production-shape batching pipeline. timeout=5s + send_batch_size=512
    # are the canonical workshop defaults — small enough that attendees see
    # data within ~5-10s of POSTing, large enough to avoid pummeling the backends.
    timeout: 5s
    send_batch_size: 512

  # ──────────────────────────────────────────────────────────────────
  # tail_sampling — Phase 11 / TSAMP-01..03 (composite envelope, D-T2)
  # ──────────────────────────────────────────────────────────────────
  #
  # WHY this processor exists: the SDK exports 100% of spans at
  # parentBased(alwaysOn()) (TSAMP invariant — head sampling lives in
  # Phase 16, never here). The Collector buffers each trace for
  # decision_wait, then DECIDES which complete traces reach Tempo based
  # on the assembled trace's full content (status_code, total latency,
  # probabilistic roll). This is the headline differentiator from head
  # sampling: the decision uses information that does not exist at span
  # creation time.
  #
  # WHY composite envelope (D-T2): wraps the three TSAMP-01 policies in
  # a single outer block that adds two production-realistic teaching
  # surfaces on top of the OR-semantics lesson:
  #   1. Per-branch RATE-LIMITS — each sub-policy has its own
  #      max-spans-per-second cap; bursts visibly clamp.
  #   2. policy_order — sub-policies are evaluated in the listed order;
  #      composite returns SAMPLED on the FIRST sub-policy that votes
  #      sample within its rate cap (so a trace that is BOTH error AND
  #      slow is sampled exactly ONCE — matched by keep-errors first,
  #      keep-slow never gets a vote — see D-T8).
  #
  # WHY the four-tier OR-semantics priority chain (TSAMP-02, F2-1):
  # the upstream tail_sampling processor evaluates ALL top-level
  # policies and applies a priority decision logic — NOT first-match.
  # Verbatim from the v0.151.0 README "Policy Decision Flow" section:
  #
  #   "When there's a 'drop' decision, the trace is not sampled;
  #    When there's an 'inverted not sample' decision, the trace is
  #      not sampled (deprecated);
  #    When there's a 'sample' decision, the trace is sampled;
  #    When there's an 'inverted sample' decision and no 'not sample'
  #      decisions, the trace is sampled (deprecated);
  #    In all other cases, the trace is NOT sampled."
  #
  # NOTE the composite-specific addendum from the same README section:
  # "if the policy is within an `and` or `composite` policy, the
  # resulting decision will be either sampled or not sampled" — i.e.,
  # inverted decisions collapse inside composite/and. With our config,
  # the priority chain reduces to "ANY top-level sample wins" because
  # we use no `drop` policies (drop-policy for /actuator/health is
  # deferred per CONTEXT.md).
  #
  # decision_wait + num_traces sizing (F2-2 mitigation): at workshop
  # load (~200 rps steady, ~10s window = ~2000 trace-fragments in flight),
  # 10000 buffer slots give 5x headroom. decision_wait=10s vs default
  # 30s is the workshop-responsiveness tradeoff (attendees see traces
  # within ~10s of POSTing).
  tail_sampling:
    decision_wait: 10s
    num_traces: 10000
    expected_new_traces_per_sec: 50
    policies:
      - name: composite-policy
        type: composite
        composite:
          # WHY 1000 spans/s ceiling: at workshop load (~200 rps × ~10
          # spans per trace = ~2000 spans/s if everything were sampled),
          # 1000 is half — enough to clamp visibly under burst, generous
          # enough that steady load never hits the global ceiling.
          # NOTE the unit is SPANS per second, NOT traces per second.
          max_total_spans_per_second: 1000
          # WHY this order: composite evaluates sub-policies in
          # policy_order and STOPS at the first vote-to-sample (within
          # rate cap). Errors are the highest-priority signal — they
          # must always survive. Slow second — never drop a slow trace
          # under workshop conditions. Probabilistic last — the
          # "representative sample of normal traffic" backstop.
          policy_order: [keep-errors, keep-slow, probabilistic-fallback]
          composite_sub_policy:
            # WHY keep-errors: production rule #1 — never drop a trace
            # that contains an error span. v1.0's TRACE-09 sets
            # span.setStatus(StatusCode.ERROR) on the deterministic
            # 10% failure path (every 10th order at consumer side).
            - name: keep-errors
              type: status_code
              status_code:
                status_codes: [ERROR]
            # WHY keep-slow: production rule #2 — never drop a trace
            # whose total duration exceeds the SLO threshold. Phase 11
            # adds a WIDGET-SLOW SKU branch in OrderService.place()
            # that Thread.sleep(1500)s inside the producer INTERNAL
            # span — the trace's MAX-span duration always > 1s.
            - name: keep-slow
              type: latency
              latency:
                threshold_ms: 1000
            # WHY probabilistic-fallback: 20% of remaining traces
            # (matches TSAMP-03 "approximately 20%" target). Tempo
            # never goes empty during workshop demos.
            - name: probabilistic-fallback
              type: probabilistic
              probabilistic:
                sampling_percentage: 20
          # WHY rate_allocation: each sub-policy's vote is GATED by
          # its own spans-per-second budget BEFORE composite returns.
          # If a sub-policy's budget is exhausted in the current 1s
          # window, composite treats its vote as not-sample and
          # continues to the next sub-policy in policy_order.
          #   - keep-errors: 100% of max_total_spans_per_second = 1000
          #     spans/s. At ~10 spans per error trace, that's ~100
          #     error traces/s — well above the workshop's actual ~20
          #     errors/s. EFFECTIVELY UNLIMITED for workshop load.
          #   - keep-slow: 20 spans/s = ~2 traces/s at ~10 spans each
          #     (matches SLOW_RPS=2 default). Slow traces beyond the
          #     cap fall through to probabilistic.
          #   - probabilistic-fallback: 40 spans/s = ~4 traces/s. ~20%
          #     of the remaining ~180 rps non-error non-slow load.
          rate_allocation:
            - policy: keep-errors
              percent: 100
            - policy: keep-slow
              percent: 2
            - policy: probabilistic-fallback
              percent: 4

  # ──────────────────────────────────────────────────────────────────
  # transform/copy_recordpolicy — Phase 11 fix for the
  # `tail-sampling-recordpolicy` debug session (resolved 2026-05-03).
  # ──────────────────────────────────────────────────────────────────
  #
  # WHY this processor exists: the alpha `processor.tailsamplingprocessor.recordpolicy`
  # feature gate (enabled in docker-compose.yml) instructs the tail_sampling
  # processor to stamp `tailsampling.policy` and `tailsampling.composite_policy`
  # onto each kept ScopeSpans batch — but it places them on the **InstrumentationScope**
  # (`ss.Scope().Attributes().PutStr(...)` in
  # processor/tailsamplingprocessor/internal/sampling/util.go:99 at v0.151.0),
  # NOT on the spans nor on the resource. Tempo 2.10.5 ingests scope attributes
  # under `scope=instrumentation` but its search APIs (`/api/search?tags=...`,
  # TraceQL `span.*`/`resource.*`/`.*`) only filter span+resource scopes — so the
  # attribute is unreachable from the workshop's verify task and dashboard
  # TraceQL filters.
  #
  # WHY this is the canonical fix (Route 1 from `.planning/debug/resolved/
  # tail-sampling-recordpolicy.md`): copy the scope attribute onto every span
  # in the batch so that the README §11 narrative ("the attribute appears on
  # each kept span"), the dashboard's per-trace click-through, and
  # `mise run verify:tail-sampling` Tier 2 are all simultaneously honest. The
  # `where ... != nil` guard prevents the OTTL set() from writing nil-string
  # span attributes when the gate is disabled or the trace path bypassed
  # composite (defensive — keeps the pipeline benign if the gate ever defaults
  # back to false in v0.152+).
  #
  # WHY pipeline placement (after tail_sampling, before batch): tail_sampling
  # is the writer of the scope attribute; batch is the last touch before the
  # otlp_http/tempo exporter. Inserting between them lets the transform see the
  # already-decided ScopeSpans (only kept traces flow past tail_sampling) and
  # the copy lands before any batching coalesces scopes from different
  # decisions.
  transform/copy_recordpolicy:
    error_mode: ignore   # WHY: never fail the pipeline if a span is missing
                         #   the scope attribute (e.g. cached_decision path,
                         #   or attendee disables the gate temporarily).
    trace_statements:
      - context: span
        statements:
          - set(attributes["tailsampling.composite_policy"], instrumentation_scope.attributes["tailsampling.composite_policy"]) where instrumentation_scope.attributes["tailsampling.composite_policy"] != nil
          - set(attributes["tailsampling.policy"], instrumentation_scope.attributes["tailsampling.policy"]) where instrumentation_scope.attributes["tailsampling.policy"] != nil

# ──────────────────────────────────────────────────────────────────
# Exporters — what goes OUT to which backend
# ──────────────────────────────────────────────────────────────────
exporters:
  otlp_http/tempo:
    # WHY: Tempo accepts OTLP HTTP on its distributor's :4318 endpoint inside the
    # compose network. http://tempo:4318 is the Docker service-name URL (D-06 spirit:
    # use service names, never localhost from inside containers).
    # NOTE: instance name is `otlp_http/tempo` (underscore — the canonical name in
    # v0.151.0). `otlphttp/tempo` works but emits a deprecation warning at startup.
    endpoint: http://tempo:4318
    tls:
      insecure: true   # WHY: docker compose internal network — no TLS on workshop boundaries

  prometheusremotewrite/mimir:
    # WHY: PRW is the canonical "many writers, one Mimir" path. Tempo's metrics_generator
    # (D-06) AND Loki's ruler (D-07) ALSO write to this same /api/v1/push endpoint —
    # three producers, one consumer, single tenant (multitenancy_enabled: false).
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

  otlp_http/loki:
    # WHY: Loki 3.7.1 accepts native OTLP on /otlp. The collector-contrib v0.151.0
    # has NO `loki` exporter component — the historical `lokiexporter` was retired in
    # favor of OTLP-native ingestion. Path /otlp is hardcoded in Loki's HTTP server.
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

# ──────────────────────────────────────────────────────────────────
# Extensions — Collector-side helpers (not in any pipeline)
# ──────────────────────────────────────────────────────────────────
extensions:
  health_check:
    # WHY: the docker-compose `healthcheck:` block on otel-collector probes
    # http://localhost:13133/ — this extension is what answers. D-10 exposes :13133.
    endpoint: 0.0.0.0:13133

# ──────────────────────────────────────────────────────────────────
# Service — wire the pipelines
# ──────────────────────────────────────────────────────────────────
service:
  extensions: [health_check]

  # WHY: telemetry block enables the Collector's OWN metrics on :8888 (Prometheus
  # scrape format) — D-10 exposes the port. Self-observability is itself part of
  # OTel-ecosystem fluency. Workshop attendees can `curl localhost:8888/metrics`
  # to see how the Collector profiles its own pipelines (queue depth, dropped spans,
  # export latency).
  # NOTE: v0.151.0 uses the MetricsConfig v0.3.0+ format — `readers:` replaces the
  # old `address:` key (which caused a parse error: 'MetricsConfigV030' has invalid
  # keys: address). The `pull` prometheus reader exposes metrics on :8888.
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                # WHY: 0.0.0.0:8888 so the host port mapping in Plan 04 can reach this.
                host: 0.0.0.0
                port: 8888

  pipelines:
    # WHY: traces — apps emit OTLP → memory_limiter → tail_sampling →
    # transform/copy_recordpolicy → batch → Tempo via OTLP HTTP.
    #
    # tail_sampling is placed BEFORE batch (canonical OTel order: see
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/v0.151.0/processor/tailsamplingprocessor/README.md
    # — "This processor … reassembles spans into new batches, causing them
    # to lose their original context"). Running batch AFTER tail_sampling
    # means the batch processor only ever sees KEPT traces (~30% of
    # incoming volume at workshop load), so batches are smaller and arrive
    # at Tempo more efficiently.
    #
    # transform/copy_recordpolicy is placed BETWEEN tail_sampling and
    # batch — see the WHY block on the processor itself for the upstream-
    # architecture rationale. Short version: the recordpolicy gate stamps
    # tailsampling.* keys onto the InstrumentationScope, this transform
    # copies them onto each span so Tempo's span-scope search APIs can
    # find them (Phase 11 `tail-sampling-recordpolicy` debug session).
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, transform/copy_recordpolicy, batch]
      exporters: [otlp_http/tempo]

    # WHY: metrics — TWO upstream sources merge into ONE Mimir pipeline:
    #   1. OTLP from the apps (PeriodicMetricReader → otlp grpc/http exporters).
    #   2. Prometheus scrapes (rabbitmq, redis_exporter, postgres_exporter).
    # Both routes converge on prometheusremotewrite/mimir → http://mimir:9009/api/v1/push.
    # Tempo's metrics_generator and Loki's ruler also remote_write to that same URL,
    # but they bypass this Collector entirely (D-06 / D-07 — backends are polyglot).
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]

    # WHY: logs — apps emit OTLP via the OpenTelemetryAppender bridge (logback-spring.xml
    # in each service) → memory_limiter → batch → Loki via OTLP HTTP at /otlp.
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/loki]
