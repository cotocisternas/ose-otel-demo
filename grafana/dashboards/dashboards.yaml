# Grafana dashboard provisioning manifest.
# Phase 7 / WORK-02 / D-01 — auto-provisions the OSE OTel Demo dashboard at
# infra:up time so workshop attendees see live three-signal telemetry the
# moment Grafana is healthy (zero clicks).
#
# Schema: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards
#
# Mount points (Phase 10 / RESEARCH §Pitfall 8 — standalone Grafana 13 paths
# differ from lgtm's internal layout):
#
#   THIS file (dashboards.yaml) is bind-mounted at
#     /etc/grafana/provisioning/dashboards/dashboards.yaml
#   inside the standalone grafana/grafana:13.0.1 container.
#
#   The dashboard JSON files (ose-otel-demo.json, ose-otel-infra.json,
#   ose-otel-noc.json) are bind-mounted from ./grafana/dashboards onto
#     /var/lib/grafana/dashboards/
#   and the `options.path` field below points at THAT directory so Grafana
#   scans it for the JSON files.
#
# The dashboard JSONs themselves are UNTOUCHED across the v1.0 → v2.0 stack
# migration: their hardcoded `"uid": "prometheus"`, `"uid": "tempo"`,
# `"uid": "loki"` references resolve against grafana/datasources.yaml's
# verbatim-from-lgtm UIDs (D-01).
apiVersion: 1

providers:
  - name: 'ose-otel-demo'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      # WHY: Phase 10 — standalone grafana/grafana:13.0.1 reads dashboard JSONs
      # from /var/lib/grafana/dashboards. The v1.0 lgtm-internal path
      # /otel-lgtm/grafana/conf/provisioning/dashboards no longer exists.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
