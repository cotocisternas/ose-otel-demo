# OSE OTel Demo workshop toolchain & tasks
# This file is the source of truth for JDK + Maven versions.
# A companion .tool-versions file is generated for IntelliJ auto-detection.

min_version = "2025.1.0"

[tools]
# Pinned to exact patch for workshop reproducibility.
# Floating "corretto-17" would drift across cohorts.
java  = "corretto-17.0.13.11.1"
maven = "3.9.11"
node  = "lts"
# Phase 7 / WORK-03: load-testing tool used by `mise run load`.
# `oha` chosen over `hey` for its TUI showing live RPS + p50/p95 latency
# (a side-by-side "client view vs server view" moment per README Step 1).
oha   = "1.14.0"

[env]
# Spring Boot reads these and configures ConnectionFactory automatically.
SPRING_RABBITMQ_HOST     = "localhost"
SPRING_RABBITMQ_PORT     = "5672"
SPRING_RABBITMQ_USERNAME = "guest"
SPRING_RABBITMQ_PASSWORD = "guest"

# Pre-wired for Phase 2+ (Phase 1 has no OTel libs to consume them).
# Setting now means later phases inherit a clean slate.
OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4317"
OTEL_EXPORTER_OTLP_PROTOCOL = "grpc"

# Stops the producer / consumer from clashing with each other on Tomcat default.
PRODUCER_PORT = "8080"
CONSUMER_PORT = "8081"

# ──────────────────────────────────────────────────────────────────
# Pre-flight: validate the developer's machine before anything starts
# ──────────────────────────────────────────────────────────────────
[tasks.preflight]
description = "Verify environment: docker, ports, JDK, Maven"
run = """
set -e
echo "--- mise tools ---"
mise current java
mise current maven
echo
echo "--- Java version (must be 17) ---"
java -version 2>&1 | head -1 | grep -q '"17' || { echo "ERROR: Java 17 not active"; exit 1; }
echo "OK"
echo
echo "--- Maven version (must be 3.9.x) ---"
mvn -version 2>&1 | head -1 | grep -q "Apache Maven 3.9" || { echo "ERROR: Maven 3.9.x not active"; exit 1; }
echo "OK"
echo
echo "--- Docker ---"
docker info > /dev/null 2>&1 || { echo "ERROR: Docker not running"; exit 1; }
echo "OK"
echo
echo "--- Port availability (D-11: 16 ports — 5 v1.0 + 1 v1.0 oversight (15692) + 8 v2.0 additions + 2 app ports (IN-03)) ---"
# Five v1.0 ports preserved verbatim: 3000 (Grafana), 4317/4318 (OTLP gRPC/HTTP at the
# Collector ingress), 5672/15672 (RabbitMQ AMQP + management UI). 15692 (RabbitMQ
# prometheus plugin) was port-mapped in compose but absent from v1.0 preflight —
# Phase 10 corrects that oversight here. Eight new ports per D-10:
#   6379  (Valkey)              5432 (Postgres)        — were missing too (preflight oversight)
#   3200  (Tempo HTTP API)      9009 (Mimir HTTP API)  3100 (Loki HTTP API)
#   13133 (Collector health)    8888 (Collector self-metrics)  8889 (Collector prometheus_exporter)
# IN-03: app ports 8080/8081 (producer + consumer Tomcat) — listed in README's
# "Required free ports" table but previously absent from preflight, so a
# pre-existing dev server on 8080 produced a confusing "Tomcat: port in use"
# error at `mise run dev:producer` time instead of a clean preflight failure.
for port in 3000 4317 4318 5672 15672 15692 6379 5432 3200 9009 3100 13133 8888 8889 8080 8081; do
  # WR-04: ss -tln is Linux-only; on macOS the command silently fails (output
  # suppressed by 2>/dev/null) and grep returns false, so every port falsely
  # reports "free". The lsof fallback works on both macOS and Linux and is the
  # diagnostic tool we already cite in the error message below.
  if ss -tln 2>/dev/null | grep -q ":${port} " || \
     lsof -iTCP:"${port}" -sTCP:LISTEN -n -P 2>/dev/null | grep -q LISTEN; then
    echo "ERROR: Port ${port} is in use. Run: lsof -i:${port} to find the process."
    exit 1
  fi
  echo "  ${port}: free"
done
echo
echo "Pre-flight: ALL GREEN. Run: mise run infra:up"
"""

# ──────────────────────────────────────────────────────────────────
# Infrastructure (docker-compose)
# ──────────────────────────────────────────────────────────────────
[tasks."infra:up"]
description = "Start all infra containers (RabbitMQ, Valkey, Postgres, OTel stack)"
run = "docker compose up -d --wait"

[tasks."infra:down"]
description = "Stop infra (preserves Grafana state via grafana-data volume)"
run = "docker compose down"

[tasks."infra:reset"]
description = "DESTRUCTIVE: stop infra AND wipe Grafana state"
run = "docker compose down -v"

[tasks."infra:logs"]
description = "Tail infra logs"
run = "docker compose logs -f"

# ──────────────────────────────────────────────────────────────────
# Build & test
# ──────────────────────────────────────────────────────────────────
[tasks.build]
description = "Build all Maven modules (skip tests)"
run = "mvn -T 1C -DskipTests clean install"

[tasks.test]
description = "Run all tests across modules"
run = "mvn -T 1C verify"

# ──────────────────────────────────────────────────────────────────
# Run apps on host JVM
# ──────────────────────────────────────────────────────────────────
[tasks."dev:producer"]
description = "Run producer-service on the host JVM"
depends = ["infra:up"]
run = "mvn -pl producer-service spring-boot:run -Dspring-boot.run.jvmArguments=\"-Dserver.port=${PRODUCER_PORT}\""

[tasks."dev:consumer"]
description = "Run consumer-service on the host JVM"
depends = ["infra:up"]
run = "mvn -pl consumer-service spring-boot:run -Dspring-boot.run.jvmArguments=\"-Dserver.port=${CONSUMER_PORT}\""

[tasks.dev]
description = "Run producer + consumer in parallel (Ctrl-C stops both)"
depends = ["infra:up"]
run = [
  { tasks = ["dev:producer", "dev:consumer"] }
]

# ──────────────────────────────────────────────────────────────────
# Workshop helpers
# ──────────────────────────────────────────────────────────────────
[tasks."demo:order"]
description = "POST sample orders to the producer; expect 202. Phase 4: alternates priority=express and priority=standard so Mimir shows two orders_created_total series."
run = """
set -e
curl -sf -X POST http://localhost:${PRODUCER_PORT}/orders \
  -H 'Content-Type: application/json' \
  -d '{"sku":"WIDGET-1","quantity":3,"priority":"express"}' && echo
curl -sf -X POST http://localhost:${PRODUCER_PORT}/orders \
  -H 'Content-Type: application/json' \
  -d '{"sku":"WIDGET-2","quantity":1,"priority":"standard"}' && echo
"""

# ──────────────────────────────────────────────────────────────────
# Continuous load (Phase 7 / WORK-03 / D-04.1)
# ──────────────────────────────────────────────────────────────────
[tasks.load]
description = "Continuous POST /orders load (~1 req/sec, ~50/50 express/standard). Run alongside `mise run dev`. Ctrl-C stops both child loaders."
run = "./scripts/load.sh"

# ──────────────────────────────────────────────────────────────────
# Screenshot capture pipeline (Phase 7 / DOC-04 / D-05).
# Manual one-shot — run before completing Phase 7 to refresh docs/screenshots/.
# CI does NOT re-run this (per D-05).
# WARNING: cycles git tags (step-01-baseline ... step-06-tests) in a worktree.
# ──────────────────────────────────────────────────────────────────
[tasks."docs:screenshots"]
description = "Capture per-step screenshots (DOC-04). Cycles step-NN-* tags via git worktree, drives Grafana via Playwright, writes docs/screenshots/*.png."
run = """
set -euo pipefail

REPO_ROOT="$PWD"
WORKTREE_DIR="$REPO_ROOT/.screenshots-worktree"
OUTPUT_DIR="$REPO_ROOT/docs/screenshots"
mkdir -p "$OUTPUT_DIR"

# Rule-3 deviation (07-04): pkill patterns must not match the running task script
# itself. mise invokes this task as `bash -c "<task body>"`, so the running bash
# argv contains the entire script text. A loose pattern (e.g. the bare goal name)
# matches the bash argv and signals the running shell — the task dies with
# "no exit status". To scope the match to real Maven invocations only, build the
# pattern by string concatenation so the dangerous substring never appears as a
# contiguous run of characters anywhere in this task body. Real dev:producer /
# dev:consumer commands are `mvn -pl ... <goal> -Dspring-boot.run.jvmArguments=...`,
# so anchoring on the goal name immediately followed by ` -D` is unique to them.
#   - mvn goal -> assemble pattern via concatenation; the contiguous matchable
#                 substring exists only at runtime in MVN_KILL_PATTERN's value
#   - oha/hey  -> use `pkill -x` (matches process NAME only, not full argv)
MVN_KILL_PATTERN='spring-boot:run'' -D'

cleanup() {
  # Kill any background dev/load processes and tear down worktree.
  pkill -f "$MVN_KILL_PATTERN" 2>/dev/null || true
  pkill -x oha 2>/dev/null || true
  pkill -x hey 2>/dev/null || true
  if git worktree list 2>/dev/null | grep -q "$WORKTREE_DIR"; then
    git worktree remove --force "$WORKTREE_DIR" 2>/dev/null || true
  fi
}
trap cleanup EXIT

# Install Playwright deps once at the canonical location (main checkout).
# Rule-3 deviation (07-04): PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 prevents npm install
# from trying to download Chromium binaries (which fails on Arch because
# `playwright install-deps` only knows apt-get/dnf/yum, not pacman). We use the
# system chromium via PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH (auto-detected in
# capture.mjs at /usr/bin/chromium, /usr/bin/chromium-browser, or /usr/bin/google-chrome).
# On systems without one, run: npx playwright install chromium
cd "$REPO_ROOT/scripts/screenshots"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm install
cd "$REPO_ROOT"

# Bring up infra once — the same lgtm/rabbitmq containers serve every tag.
mise run infra:up

TAGS=(step-01-baseline step-02-traces step-03-context-propagation step-04-metrics step-05-logs step-06-tests)

for tag in "${TAGS[@]}"; do
  echo "=== capturing for $tag ==="
  # Fresh worktree for the tag (idempotent — clean any stale one).
  [ -d "$WORKTREE_DIR" ] && git worktree remove --force "$WORKTREE_DIR" 2>/dev/null || true
  git worktree add "$WORKTREE_DIR" "$tag"

  # Build + start dev from the worktree (host JVM via mise).
  pushd "$WORKTREE_DIR" > /dev/null

  # Phase 1 baseline (step-01-baseline) is a working Spring Boot app with zero OTel libs —
  # the build SHOULD succeed at every tag. A failure here is a real problem; surface it.
  if ! mvn -T 1C -DskipTests -q clean install; then
    echo "build failed for $tag — aborting capture (this should not happen for any step-NN-* tag)"
    exit 1
  fi

  # Start dev in background; let Spring Boot processes warm up.
  mise run dev > "$REPO_ROOT/.screenshots-worktree-dev.log" 2>&1 &
  DEV_PID=$!
  sleep 25  # Spring Boot startup (~15-20s realistic)

  # Start load in background to populate panels (skip for step-01-baseline — no apps will accept).
  if [ "$tag" != "step-01-baseline" ]; then
    "$REPO_ROOT/scripts/load.sh" > "$REPO_ROOT/.screenshots-worktree-load.log" 2>&1 &
    LOAD_PID=$!
    sleep 30  # WARMUP_MS — let panels populate
  fi

  popd > /dev/null

  # Run capture for this tag's outputs.
  # capture.mjs runs all CAPTURES; we filter via env to capture only this tag's entries.
  CAPTURE_TAG_FILTER="$tag" node "$REPO_ROOT/scripts/screenshots/capture.mjs" || echo "capture for $tag had failures — see logs"

  # Tear down dev + load before moving to next tag.
  # Rule-3 deviation (07-04): scoped pattern via $MVN_KILL_PATTERN — see top-of-task
  # comment for why we cannot write the matchable substring as a literal here.
  [ -n "${LOAD_PID:-}" ] && kill "$LOAD_PID" 2>/dev/null || true
  kill "$DEV_PID" 2>/dev/null || true
  pkill -f "$MVN_KILL_PATTERN" 2>/dev/null || true
  sleep 5

  git worktree remove --force "$WORKTREE_DIR" 2>/dev/null || true
done

echo "=== screenshots complete ==="
ls -la "$OUTPUT_DIR"
"""

[tasks."verify:bom"]
description = "Phase 2 invariant: one version per io.opentelemetry* artifact across the reactor"
run = """
set -e

# Run dependency:tree across the full reactor, filter to OTel artifacts only,
# extract groupId:artifactId:type (NOT version) per occurrence, then look for
# any artifact appearing under MULTIPLE distinct versions across modules.
#
# Layout of the relevant dependency:tree lines:
#   [INFO] +- io.opentelemetry:opentelemetry-api:jar:1.61.0:compile
#   [INFO] |  \\- io.opentelemetry:opentelemetry-context:jar:1.61.0:compile
#
# We split on ':' to get groupId, artifactId, type, version.
#
# NOTE: Do NOT pass `-q` to mvn — the maven-dependency-plugin emits its tree
# via [INFO] logs, and `-q` (quiet) suppresses those. The full output is
# noisy but we filter it down with grep below.
OUTPUT=$(mvn dependency:tree -Dincludes=io.opentelemetry 2>&1)
VIOLATIONS=$(printf '%s\\n' "$OUTPUT" \\
  | grep -oE 'io\\.opentelemetry[a-z.-]*:[a-z0-9-]+:(jar|pom):[0-9a-zA-Z.-]+' \\
  | sort -u \\
  | awk -F: '{ key=$1":"$2":"$3; ver=$4; if (seen[key] && seen[key] != ver) print key" appears at versions "seen[key]" AND "ver; seen[key]=ver }')

if [ -n "$VIOLATIONS" ]; then
  echo "ERROR: Phase 2 invariant violated — the following OTel artifacts appear at multiple versions across the reactor:"
  printf '%s\\n' "$VIOLATIONS"
  echo
  echo "Full dependency:tree output for diagnosis:"
  printf '%s\\n' "$OUTPUT"
  exit 1
fi

# Also confirm we're not in the (impossible-after-Plan-02-01) state of zero
# OTel libs — a freshly cloned repo at step-02-traces MUST have artifacts.
COUNT=$(printf '%s\\n' "$OUTPUT" | grep -cE 'io\\.opentelemetry[a-z.-]*:[a-z0-9-]+:(jar|pom):' || true)
if [ "$COUNT" -eq 0 ]; then
  echo "ERROR: zero OpenTelemetry artifacts on the classpath — Phase 2 expects the SDK to be present."
  echo "If you want the Phase 1 baseline state, check out tag step-01-baseline."
  exit 1
fi

echo "Phase 2 baseline confirmed: one version per OpenTelemetry artifact across all modules."
"""

[tasks."ui:grafana"]
description = "Open Grafana in the default browser"
run = "xdg-open http://localhost:3000 2>/dev/null || open http://localhost:3000"

[tasks."ui:rabbitmq"]
description = "Open RabbitMQ Management UI in the default browser"
run = "xdg-open http://localhost:15672 2>/dev/null || open http://localhost:15672"

# ──────────────────────────────────────────────────────────────────
# Phase 10 — verify:datasources (D-03)
# ──────────────────────────────────────────────────────────────────
[tasks."verify:datasources"]
description = "Phase 10 invariant: Grafana provisioned datasource UIDs match the dashboard JSON contract"
run = """
set -e

# WHY: ose-otel-demo.json hardcodes uid='tempo', 'prometheus', 'loki' (NOT 'mimir' — D-01).
# This task fast-fails if any drift, BEFORE attendees see blank dashboards.
# Mirrors the verify:bom task pattern (Phase 2 invariant): compute expected, compute
# actual via curl + jq, diff, non-zero exit on drift.
#
# RETRY LOOP (6 attempts × 5s sleep → up to 30s total):
# RESEARCH cautioned that Mimir cold-start can be 10-25s on slower workshop laptops,
# and Grafana datasource provisioning races behind backend readiness. A single curl
# right after `docker compose up --wait` can hit Grafana before its provisioning
# pass finishes. The retry loop tolerates that startup race without forcing every
# caller (Plan 05 smoke, README Step 10 attendee invocation, CI) to wrap the call.

EXPECTED='loki
prometheus
tempo'

# Bounded retry: try 6 times, sleep 5s between attempts (up to 30s tolerance).
# WHY 6×5: Mimir cold-start 10-25s + Grafana provisioning lag → 30s upper bound
# is comfortable on slower laptops without making a healthy stack feel sluggish.
ATTEMPTS=6
SLEEP_SECS=5
LAST_ERR=""
for i in $(seq 1 $ATTEMPTS); do
  # Hit Grafana's HTTP API (no auth needed — anonymous Admin enabled in compose env).
  ACTUAL=$(curl -fsS http://localhost:3000/api/datasources 2>&1) || {
    LAST_ERR="curl failed: $ACTUAL"
    [ "$i" -lt "$ATTEMPTS" ] && { echo "verify:datasources: attempt $i/$ATTEMPTS — Grafana not ready yet ($LAST_ERR); retrying in ${SLEEP_SECS}s..."; sleep $SLEEP_SECS; continue; }
    echo "ERROR: verify:datasources timed out after $((ATTEMPTS * SLEEP_SECS))s — Grafana not reachable on :3000."
    echo "Last error: $LAST_ERR"
    echo "Run: mise run infra:up"
    exit 1
  }

  # Validate the JSON shape contains at least one entry with a uid; if Grafana
  # is up but provisioning hasn't completed, the array will be empty.
  if ! printf '%s\n' "$ACTUAL" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
    LAST_ERR="Grafana returned empty datasource array (provisioning still in progress?)"
    [ "$i" -lt "$ATTEMPTS" ] && { echo "verify:datasources: attempt $i/$ATTEMPTS — $LAST_ERR; retrying in ${SLEEP_SECS}s..."; sleep $SLEEP_SECS; continue; }
    echo "ERROR: verify:datasources timed out after $((ATTEMPTS * SLEEP_SECS))s — $LAST_ERR"
    exit 1
  fi

  # We have a non-empty array; break and run the contract diff below.
  break
done

# Extract just the uid field from each entry, sort, dedupe.
ACTUAL_UIDS=$(printf '%s\n' "$ACTUAL" | jq -r '.[].uid' | sort -u)

# Compare expected vs actual — diff returns non-zero on any drift.
if ! diff <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$ACTUAL_UIDS") > /tmp/ds-diff 2>&1; then
  echo "ERROR: Grafana datasource UIDs drifted from the dashboard contract."
  echo "Expected (3 UIDs):"
  printf '  %s\n' "$EXPECTED"
  echo "Actual (provisioned by grafana/datasources.yaml):"
  printf '  %s\n' "$ACTUAL_UIDS"
  echo
  echo "Diff:"
  cat /tmp/ds-diff
  echo
  echo "If you renamed a datasource, the ose-otel-demo dashboard JSON must be updated to match (NOT recommended — keep the contract)."
  exit 1
fi

echo "Phase 10 datasource contract: 3 UIDs match (loki, prometheus, tempo)."
"""

# ──────────────────────────────────────────────────────────────────
# Phase 10 — verify:images (D-14 / X-3 — STACK-02 floating-tag guardrail)
# ──────────────────────────────────────────────────────────────────
[tasks."verify:images"]
description = "Phase 10 invariant: every docker-compose image: tag is a fully-qualified patch version (no floating tags)"
run = """
set -e

# WHY: workshop reproducibility (X-3 / D-14). Floating tags break clones across cohorts.
# Floating patterns to reject:
#   - :latest                              (unconditional)
#   - :NN              (e.g., :17 :3)      (major-only)
#   - :NN.NN           (e.g., :3.7 :2.10)  (major.minor only — no patch)
#   - no tag at all    (e.g., 'image: rabbitmq')
#
# Acceptable patterns:
#   - :NN.NN.NN          (e.g., :3.7.1 :13.0.1)
#   - :NN.NN.NN-suffix   (e.g., :3.7.1-alpine)   # full patch + flavor — not floating
#   - :NN.NN-suffix      (e.g., :4.3-management-alpine)  # WARNING: minor-only + flavor;
#                                                        # currently accepted because no
#                                                        # rabbitmq 4.3.x patch + flavor combo
#                                                        # is pinned in the demo. Extending the
#                                                        # floating regex to catch this would
#                                                        # require pinning rabbitmq first.
#   - vX.Y.Z             (e.g., v1.83.0 — Prometheus-style v-prefix)
#
# Floating patterns rejected by the regex below (WR-02 extended NN-suffix detection):
#   - :NN-suffix         (e.g., :17-alpine)       # major-only + flavor = still floating

# Extract image: lines, ignore comments.
LINES=$(grep -E '^[[:space:]]*image:' docker-compose.yml | grep -v '^[[:space:]]*#')

# Floating-tag regex:
#   - no colon at all (no tag)
#   - :latest
#   - :digit-only at end of line
#   - :digit.digit (without trailing .digit) at end of line
#   - :digit-suffix at end of line (e.g., :17-alpine — major-only + flavor; WR-02 extension)
FLOATING=$(printf '%s\n' "$LINES" | grep -E '(image:[[:space:]]*[^:[:space:]]+[[:space:]]*$|:latest[[:space:]]*$|:[0-9]+[[:space:]]*$|:[0-9]+\\.[0-9]+[[:space:]]*$|:[0-9]+-[^[:space:]]+[[:space:]]*$)' || true)

if [ -n "$FLOATING" ]; then
  echo "ERROR: Phase 10 invariant violated — docker-compose.yml contains floating image tags:"
  printf '%s\n' "$FLOATING"
  echo
  echo "Pin every image to an exact patch version. Examples:"
  echo "  rabbitmq:4.3-management-alpine     # OK (flavor suffix is not floating)"
  echo "  grafana/grafana:13.0.1             # OK (full patch version)"
  echo "  grafana/grafana:13.0               # WRONG (minor only — floating)"
  echo "  grafana/grafana:latest             # WRONG (latest — floating)"
  exit 1
fi

# Also confirm we have at least 5 image: lines (the v2.0 5-container minimum).
COUNT=$(printf '%s\n' "$LINES" | wc -l)
if [ "$COUNT" -lt 5 ]; then
  echo "WARNING: only $COUNT image: lines found — v2.0 expects at least 5 observability containers."
fi

echo "Phase 10 image-pin contract: $COUNT image:s, all pinned to exact patch versions."
"""

# ──────────────────────────────────────────────────────────────────
# Phase 11 — verify:tail-sampling (D-T14)
# ──────────────────────────────────────────────────────────────────
[tasks."verify:tail-sampling"]
description = "Phase 11 invariant: tail_sampling processor is loaded AND emitting decisions for the composite envelope (Route A). Sub-policy names verified via Tempo span attribute (alpha recordpolicy gate)."
run = """
set -e

# WHY: catches typos in policy names, processor not loaded, configuration
# drift between otelcol-config.yaml and the ose-otel-demo.json dashboard
# row. Mirrors verify:datasources (Phase 10 D-03) and verify:images (D-14)
# pattern: bash one-liner with grep + assertion; non-zero exit on violation.
#
# Two-tier check:
#   1. Self-metrics (:8888/metrics) — assert composite-policy is registered
#      and emitting non-zero count_traces_sampled. This proves the processor
#      LOADED and is making decisions.
#   2. Tempo (:3200/api/search) — assert at least one recently-sampled
#      trace carries a tailsampling.composite_policy attribute with one of
#      the three configured sub-policy names (proves the recordpolicy
#      feature gate is wired AND the YAML names match what's running).
#
# Retry loop (6×5s = 30s tolerance) — Collector cold-start + decision_wait
# buffering means a freshly-started stack needs ~15s before the first
# composite-policy series appears. Mirrors verify:datasources retry shape.

EXPECTED_OUTER='composite-policy'
EXPECTED_SUBS='keep-errors keep-slow probabilistic-fallback'
ATTEMPTS=6
SLEEP_SECS=5
LAST_ERR=""

# --- Tier 1: self-metrics ---
for i in $(seq 1 $ATTEMPTS); do
  ACTUAL=$(curl -fsS http://localhost:8888/metrics 2>&1) || {
    LAST_ERR="curl :8888 failed: $ACTUAL"
    [ "$i" -lt "$ATTEMPTS" ] && { echo "verify:tail-sampling tier-1 attempt $i/$ATTEMPTS — Collector self-metrics not ready ($LAST_ERR); retrying in ${SLEEP_SECS}s..."; sleep $SLEEP_SECS; continue; }
    echo "ERROR: verify:tail-sampling tier-1 timed out after $((ATTEMPTS * SLEEP_SECS))s — Collector :8888 not reachable."
    echo "Last error: $LAST_ERR"
    echo "Run: mise run infra:up"
    exit 1
  }

  # Match a non-zero count_traces_sampled series with policy=composite-policy.
  # The _total suffix is added by the OTel-Go Prometheus exporter (§3.2 of
  # 11-RESEARCH.md). The match is intentionally loose on label ordering since
  # the exporter does not guarantee a stable label order.
  if printf '%s\n' "$ACTUAL" | grep -E "^otelcol_processor_tail_sampling_count_traces_sampled_total\\{[^}]*policy=\\"${EXPECTED_OUTER}\\"" >/dev/null 2>&1; then
    break
  fi

  LAST_ERR="metric otelcol_processor_tail_sampling_count_traces_sampled_total not yet emitted with policy=\\"${EXPECTED_OUTER}\\""
  [ "$i" -lt "$ATTEMPTS" ] && { echo "verify:tail-sampling tier-1 attempt $i/$ATTEMPTS — $LAST_ERR; retrying in ${SLEEP_SECS}s..."; sleep $SLEEP_SECS; continue; }
  echo "ERROR: verify:tail-sampling tier-1 — $LAST_ERR after $((ATTEMPTS * SLEEP_SECS))s."
  echo "Diagnostics:"
  printf '%s\n' "$ACTUAL" | grep -E '^otelcol_processor_tail_sampling_' | head -20
  echo
  echo "If composite-policy renamed in otelcol-config.yaml, update EXPECTED_OUTER above."
  exit 1
done

echo "verify:tail-sampling tier-1: composite-policy registered and emitting (self-metrics)."

# --- Tier 2: Tempo span attribute (recordpolicy feature gate) ---
# Search Tempo for spans carrying the tailsampling.composite_policy
# attribute set to EACH of the three expected sub-policy names. The
# recordpolicy feature gate must be enabled on the otel-collector container
# (--feature-gates=processor.tailsamplingprocessor.recordpolicy in compose),
# and the transform/copy_recordpolicy processor in otelcol-config.yaml must
# copy the scope attribute onto each span — without that copy the attribute
# lives on the InstrumentationScope where Tempo's tags= search cannot see it
# (see .planning/debug/resolved/tail-sampling-recordpolicy.md).
#
# Tempo's legacy /api/search?tags= takes logfmt key=value pairs. Sending
# bare-key (no value) returns 0 hits silently — that was the original bug.
# We issue ONE query per expected sub-policy and require non-empty .traces[]
# from each so a single missing sub-policy fails fast with a precise message.
MISSING=""
for sub in $EXPECTED_SUBS; do
  TEMPO_SEARCH="http://localhost:3200/api/search?tags=tailsampling.composite_policy=${sub}&limit=1"
  TEMPO_OUT=$(curl -fsS "$TEMPO_SEARCH" 2>&1) || {
    echo "ERROR: verify:tail-sampling tier-2 — Tempo /api/search failed for sub-policy '${sub}': $TEMPO_OUT"
    exit 1
  }
  # A successful match returns {"traces":[{...,"traceID":"..."},...],...}.
  # An empty {"traces":[],"metrics":{...}} response carries no "traceID"
  # substring, so a literal grep for "traceID" is a precise non-empty test
  # (no regex required — keeps the TOML triple-quoted string free of
  # backslash-escape gotchas).
  if ! printf '%s' "$TEMPO_OUT" | grep -F '"traceID"' >/dev/null 2>&1; then
    MISSING="$MISSING $sub"
  fi
done

if [ -n "$MISSING" ]; then
  echo "ERROR: verify:tail-sampling tier-2 — sub-policy values missing from Tempo span attributes:$MISSING"
  echo "Likely causes (in order of probability):"
  echo "  1. transform/copy_recordpolicy processor missing or mis-wired in"
  echo "     infra/observability/otelcol-config.yaml (it must sit AFTER"
  echo "     tail_sampling and BEFORE batch in service.pipelines.traces)."
  echo "  2. recordpolicy feature gate not enabled on the otel-collector"
  echo "     container (check docker-compose.yml --feature-gates flag)."
  echo "  3. Sub-policy names in otelcol-config.yaml drifted from EXPECTED_SUBS."
  echo '  4. No traffic of that shape reached the Collector during the wait'
  echo '     window — re-run mise run load SLOW_RPS=2 and try again.'
  echo "Last Tempo response (first 500 chars):"
  printf '%s' "$TEMPO_OUT" | head -c 500
  exit 1
fi

echo "verify:tail-sampling tier-2: all three sub-policy values returned non-empty Tempo /api/search hits."
echo "verify:tail-sampling: GREEN — composite + sub-policy contracts intact."
"""

# Phase 12 — verify:exemplars (D-E7)
# ──────────────────────────────────────────────────────────────────
[tasks."verify:exemplars"]
description = "Phase 12 invariant: Mimir stores at least one exemplar with trace_id for http_server_request_duration_seconds_bucket — proves SDK ExemplarFilter + Mimir limits config are both active."
run = """
set -e

# Query the last 10 minutes of exemplars from Mimir's Prometheus-compatible API.
# Prerequisites: mise run load (generate traffic), wait ~30s for metrics export, then run this task.
START=$(date -u -d '10 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
END=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

echo "verify:exemplars: querying Mimir exemplar API for http_server_request_duration_seconds_bucket..."
RESULT=$(curl -fsS "http://localhost:9009/prometheus/api/v1/query_exemplars?query=http_server_request_duration_seconds_bucket&start=${START}&end=${END}")

# Assert: .data array non-empty AND first series has exemplars AND first exemplar has a trace_id label.
# An empty .data array means the exemplar pipeline is not yet active (check all three layers).
if ! printf '%s' "$RESULT" | jq -e '.data | length > 0 and (.[0].exemplars | length > 0) and (.[0].exemplars[0].labels.trace_id != null)' >/dev/null 2>&1; then
  echo "ERROR: verify:exemplars — no exemplars with trace_id found in Mimir for the last 10 minutes"
  echo "Diagnose in order:"
  echo "  1. SDK layer: grep 'setExemplarFilter' producer-service/src/main/java/com/example/producer/config/OtelSdkConfiguration.java"
  echo "     Expected: .setExemplarFilter(ExemplarFilter.traceBased())"
  echo "  2. Scope fix: grep -c 'try (Scope' producer-service/src/main/java/com/example/producer/config/HttpServerSpanFilter.java"
  echo "     Expected: 0 (must use manual scope, not try-with-resources)"
  echo "  3. Mimir limits: grep 'max_global_exemplars_per_user' infra/observability/mimir-config.yaml"
  echo "     Expected: max_global_exemplars_per_user: 100000"
  echo "  4. Mimir restart: docker compose restart mimir && sleep 10"
  echo "  5. Generate load: mise run load && sleep 30 && mise run verify:exemplars"
  echo "Mimir API response: $RESULT"
  exit 1
fi

echo "verify:exemplars: GREEN — exemplars with trace_id are present in Mimir. Click any dot on the"
echo "  'HTTP Request Duration (with Exemplars)' panel in the ose-otel-demo dashboard to navigate to Tempo."
"""
